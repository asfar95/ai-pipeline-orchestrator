<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 660" width="780" height="660">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <filter id="glow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-4%" y="-6%" width="108%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="orch-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#131b35"/>
      <stop offset="100%" stop-color="#080b14"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="780" height="660" fill="url(#bg)"/>
  <rect width="780" height="660" fill="url(#dots)"/>

  <!-- Title -->
  <text x="390" y="44" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">GitHub AI Automation Pipeline</text>
  <text x="390" y="66" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#64748b">Open a bug issue — four AI agents handle everything, end to end</text>

  <!-- ═══ ORCHESTRATOR ═══ -->
  <rect x="30" y="86" width="720" height="78" rx="12" fill="url(#orch-grad)" filter="url(#glow)"/>
  <rect x="30" y="86" width="720" height="1.5" rx="1" fill="#a78bfa" opacity="0.6"/>
  <text x="390" y="116" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" fill="#ffffff">🔀  ai-pipeline-orchestrator</text>
  <text x="390" y="137" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#ddd6fe">Receives ALL GitHub webhooks  ·  Stateful sequencing  ·  Single entry point</text>
  <text x="390" y="155" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#c4b5fd">Holds each event until the previous agent signals completion</text>

  <!-- Connector 1 -->
  <line x1="390" y1="164" x2="390" y2="188" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="274" y="168" width="232" height="19" rx="9.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="181" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#94a3b8">① issues.opened / reopened</text>

  <!-- ═══ TRIAGE CARD ═══ -->
  <rect x="30" y="191" width="720" height="80" rx="10" fill="#111827" stroke="#1d3050" stroke-width="1" filter="url(#shadow)"/>
  <rect x="30" y="191" width="4" height="80" rx="2" fill="#3b82f6"/>
  <text x="62" y="221" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">🤖  Triage Agent</text>
  <text x="62" y="240" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#3b82f6">github-issue-triage-agent</text>
  <text x="62" y="259" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#475569">Classify issue · add labels · post triage comment</text>
  <!-- Outputs -->
  <rect x="516" y="205" width="116" height="20" rx="10" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
  <text x="574" y="219" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#60a5fa">bug label added</text>
  <rect x="642" y="205" width="102" height="20" rx="10" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
  <text x="693" y="219" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#60a5fa">comment posted</text>

  <!-- Connector 2 -->
  <line x1="390" y1="271" x2="390" y2="295" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="228" y="275" width="324" height="19" rx="9.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="288" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#94a3b8">② issues.labeled "bug"  ·  held until triage-done ↑</text>

  <!-- ═══ AUTOFIX CARD ═══ -->
  <rect x="30" y="298" width="720" height="80" rx="10" fill="#111827" stroke="#14532d" stroke-width="1" filter="url(#shadow)"/>
  <rect x="30" y="298" width="4" height="80" rx="2" fill="#10b981"/>
  <text x="62" y="328" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">🔧  Autofix Agent</text>
  <text x="62" y="347" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#10b981">github-autofix-agent</text>
  <text x="62" y="366" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#475569">Find root cause · write minimal fix · open pull request</text>
  <!-- Outputs -->
  <rect x="504" y="312" width="126" height="20" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="567" y="326" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#34d399">fix branch created</text>
  <rect x="640" y="312" width="104" height="20" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="692" y="326" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#34d399">PR opened</text>

  <!-- Connector 3 -->
  <line x1="390" y1="378" x2="390" y2="402" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="240" y="382" width="300" height="19" rx="9.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="395" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#94a3b8">③ pull_request.opened / synchronize</text>

  <!-- ═══ REVIEW BOT CARD ═══ -->
  <rect x="30" y="405" width="720" height="80" rx="10" fill="#111827" stroke="#78350f" stroke-width="1" filter="url(#shadow)"/>
  <rect x="30" y="405" width="4" height="80" rx="2" fill="#f59e0b"/>
  <text x="62" y="435" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">🔍  Code Review Bot</text>
  <text x="62" y="454" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#f59e0b">ai-code-review-bot</text>
  <text x="62" y="473" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#475569">Review every changed file · post inline diff comments</text>
  <!-- Outputs -->
  <rect x="490" y="419" width="256" height="20" rx="10" fill="#431407" stroke="#92400e" stroke-width="1"/>
  <text x="618" y="433" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#fbbf24">inline diff review comments posted</text>

  <!-- Connector 4 -->
  <line x1="390" y1="485" x2="390" y2="509" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="204" y="489" width="372" height="19" rx="9.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="502" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#94a3b8">④ pull_request_review.submitted  ·  fix/issue-* branches only</text>

  <!-- ═══ REVIEW-FIX CARD ═══ -->
  <rect x="30" y="512" width="720" height="80" rx="10" fill="#111827" stroke="#3b0764" stroke-width="1" filter="url(#shadow)"/>
  <rect x="30" y="512" width="4" height="80" rx="2" fill="#8b5cf6"/>
  <text x="62" y="542" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">🔧  Review-Fix Agent</text>
  <text x="62" y="561" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#8b5cf6">github-autofix-agent  ·  review mode</text>
  <text x="62" y="580" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#475569">Apply fixes · reply to inline and out-of-diff comments</text>
  <!-- Outputs -->
  <rect x="516" y="526" width="110" height="20" rx="10" fill="#2e1065" stroke="#5b21b6" stroke-width="1"/>
  <text x="571" y="540" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#c4b5fd">fixes applied</text>
  <rect x="636" y="526" width="108" height="20" rx="10" fill="#2e1065" stroke="#5b21b6" stroke-width="1"/>
  <text x="690" y="540" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#c4b5fd">PR replies posted</text>

  <!-- Footer -->
  <line x1="30" y1="616" x2="750" y2="616" stroke="#1e293b" stroke-width="1"/>
  <text x="390" y="638" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#374151">The orchestrator queues the "bug" label event until triage-done arrives — sequential execution guaranteed even under concurrent load</text>
</svg>
